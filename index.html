  // 加载模块列表
  QuizDB.getAllQuestions().then(function (questions) {
    var modules = [];
    var moduleSet = {};
    questions.forEach(function (q) {
      if (!moduleSet[q.module]) {
        moduleSet[q.module] = true;
        modules.push(q.module);
      }
    });
    var moduleSelect = document.getElementById('qc-module');
    modules.forEach(function (m) {
      var option = document.createElement('option');
      option.value = m;
      option.textContent = m;
      moduleSelect.appendChild(option);
    });
  });

  // 表单提交
  document.getElementById('quiz-config-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var type = document.getElementById('qc-type').value || null;
    var module = document.getElementById('qc-module').value || null;
    var mode = document.getElementById('qc-mode').value;
    var count = parseInt(document.getElementById('qc-count').value) || null;
    overlay.remove();
    App.startQuiz(type, module, mode, count);
  });
};

// ===============================
// 答题页
// ===============================

/**
 * 开始答题
 * 
 * @param {string|null} type - 题型筛选
 * @param {string|null} module - 模块筛选
 * @param {string} mode - 答题模式
 * @param {number|null} count - 出题数量
 */
App.startQuiz = function (type, module, mode, count) {
  var self = this;

  // 检查是否有未完成的答题进度，提示用户恢复
  if (this._hasSavedProgress()) {
    var savedData = null;
    try {
      savedData = JSON.parse(localStorage.getItem(this._AUTO_SAVE_KEY));
    } catch (e) {}

    var savedInfo = '';
    if (savedData && savedData.state) {
      var answeredCount = Object.keys(savedData.state.isSubmitted || {}).length;
      var totalCount = savedData.state.totalCount || 0;
      savedInfo = '\n\n上次进度：已完成 ' + answeredCount + ' / ' + totalCount + ' 题';
    }

    if (confirm('检测到上次未完成的答题进度，是否继续上次的答题？' + savedInfo)) {
      if (this._restoreProgress()) {
        this.navigate('quiz');
        return;
      }
    }
    // 用户选择不恢复，清除旧进度
    this._clearProgress();
  }

  QuizEngine.init({
    type: type,
    module: module,
    mode: mode,
    count: count,
    shuffleOptions: true
  }).then(function (result) {
    if (result.totalCount === 0) {
      self.showToast('没有找到符合条件的题目', 'error');
      self.navigate('home');
      return;
    }
    self._intensiveMode = false;
    // 启动自动保存机制
    self._setupAutoSave();
    self.navigate('quiz');
  });
};

/**
 * 开始收藏题目答题
 * 获取所有收藏题目ID，以随机模式启动答题
 */
App.startBookmarked = function () {
  var self = this;
  QuizDB.getBookmarks().then(function (bookmarks) {
    if (bookmarks.length === 0) {
      self.showToast('暂无收藏题目，请在答题或浏览题库时点击星标收藏', 'info');
      return;
    }
    QuizEngine.init({
      questionIds: bookmarks,
      mode: 'random',
      shuffleOptions: true
    }).then(function (result) {
      if (result.totalCount === 0) {
        self.showToast('没有找到收藏题目', 'error');
        return;
      }
      self._intensiveMode = false;
      // 启动自动保存机制
      self._setupAutoSave();
      self.navigate('quiz');
    });
  });
};

/**
 * 渲染答题页
 */
App._renderQuiz = function (container) {
  var question = QuizEngine.getCurrentQuestion();
  if (!question) {
    // 所有题目已答完，跳转到结果页
    this._finishQuiz();
    return;
  }

  var progress = QuizEngine.getProgress();
  var isSubmitted = QuizEngine.isCurrentSubmitted();
  var result = isSubmitted ? QuizEngine._state.results[question.id] : null;

  var html = '';

  // 进度区域
  html += '<div class="bg-white rounded-xl p-4 shadow-md mb-4">'
    + '  <div class="flex justify-between items-center mb-2">'
    + '    <span style="font-family:黑体,SimHei;color:#1e3a5f">第 ' + progress.current + ' / ' + progress.total + ' 题</span>'
    + '    <span class="timer-display" id="quiz-timer">00:00</span>'
    + '  </div>'
    + '  <div class="progress-bar-container">'
    + '    <div class="progress-bar-fill" style="width:' + progress.percentage + '%"></div>'
    + '  </div>'
    + '</div>';

  // 题目卡片
  html += '<div class="question-card">';

  // 题目信息
  html += '<div class="flex items-center flex-wrap gap-2 mb-2">'
    + '  <span class="question-type-badge badge-' + question.type + '">' + QuizEngine.getTypeName(question.type) + '</span>'
    + '  <span class="question-module">[' + question.module + ']</span>'
    + '  <span class="difficulty-badge difficulty-' + question.difficulty + '">' + QuizEngine.getDifficultyName(question.difficulty) + '</span>'
    + '  <span class="bookmark-btn cursor-pointer" id="bookmark-btn" onclick="App._toggleBookmarkCurrent()" title="点击收藏/取消收藏" style="font-size:1.3rem">&#9733;</span>'
    + '</div>';

  html += '<div class="question-text">' + (progress.current) + '. ' + this._escapeHtml(question.stem) + '</div>';

  // 根据题型渲染答题区域
  switch (question.type) {
    case 'single':
      html += this._renderSingleOptions(question, isSubmitted, result);
      break;
    case 'multiple':
    case 'multi':
      html += this._renderMultipleOptions(question, isSubmitted, result);
      break;
    case 'judge':
      html += this._renderJudgeOptions(question, isSubmitted, result);
      break;
    case 'fill':
      html += this._renderFillInput(question, isSubmitted, result);
      break;
    case 'short_answer':
    case 'case':
      html += this._renderTextArea(question, isSubmitted);
      break;
  }

  html += '</div>';

  // 操作按钮区域
  html += '<div class="flex justify-between items-center mt-4">';
  if (QuizEngine.getCurrentIndex() > 0) {
    html += '<button class="btn-secondary" onclick="App._prevQuestion()">上一题</button>';
  } else {
    html += '<div></div>';
  }

  if (!isSubmitted) {
    html += '<button class="btn-primary" onclick="App._submitCurrent()">提交答案</button>';
  } else {
    // 显示解析
    html += '<button class="btn-primary" onclick="App._nextQuestion()">下一题</button>';
  }
  html += '</div>';

  // 题目导航
  html += '<div class="bg-white rounded-xl p-4 shadow-md mt-4">';
  html += '<div class="flex flex-wrap gap-2">';
  for (var i = 0; i < QuizEngine.getTotalCount(); i++) {
    var q = QuizEngine._state.questions[i];
    var submitted = QuizEngine._state.isSubmitted[q.id];
    var r = QuizEngine._state.results[q.id];
    var cls = 'w-8 h-8 rounded flex items-center justify-center text-sm font-bold cursor-pointer border transition-all ';
    if (i === QuizEngine.getCurrentIndex()) {
      cls += 'border-blue-500 bg-blue-500 text-white';
    } else if (submitted && r) {
      cls += r.isCorrect ? 'border-green-400 bg-green-100 text-green-700' : 'border-red-400 bg-red-100 text-red-700';
    } else {
      cls += 'border-gray-300 bg-white text-gray-600 hover:border-blue-300';
    }
    html += '<span class="' + cls + '" onclick="App._goToQuestion(' + i + ')">' + (i + 1) + '</span>';
  }
  html += '</div>';
  html += '</div>';

  container.innerHTML = html;

  // 启动计时器
  this._startTimer();

  // 初始化收藏按钮状态
  this._initBookmarkState(question);

  // 如果已提交，恢复用户答案并显示解析
  if (isSubmitted && result) {
    this._showAnalysis(question, result);
  }
};

/**
 * 渲染单选题选项
 */
App._renderSingleOptions = function (question, isSubmitted, result) {
  var options = QuizEngine.getShuffledOptions(question);
  var userAnswer = QuizEngine._state.answers[question.id] || '';
  var correctLabel = QuizEngine.getShuffledCorrectAnswer(question);

  var html = '<ul class="options-list">';
  options.forEach(function (opt) {
    var cls = 'option-item';
    if (isSubmitted) {
      if (opt.label === correctLabel) cls += ' correct';
      if (opt.label === userAnswer && opt.label !== correctLabel) cls += ' wrong';
    } else {
      if (opt.label === userAnswer) cls += ' selected';
    }
    var clickable = isSubmitted ? '' : ' onclick="App._selectSingle(\'' + question.id + '\',\'' + opt.label + '\')"';
    html += '<li class="' + cls + '"' + clickable + '>'
      + '  <span class="option-label">' + opt.label + '</span>'
      + '  <span class="option-text">' + App._escapeHtml(opt.text) + '</span>'
      + '</li>';
  });
  html += '</ul>';
  return html;
};

/**
 * 渲染多选题选项
 */
App._renderMultipleOptions = function (question, isSubmitted, result) {
  var options = QuizEngine.getShuffledOptions(question);
  var userAnswer = QuizEngine._state.answers[question.id] || '';
  var userLabels = userAnswer.split('');
  var correctLabel = QuizEngine.getShuffledCorrectAnswer(question);
  var correctLabels = correctLabel.split('');

  var html = '<div class="mb-2" style="color:#6b7280;font-size:0.85rem">（可多选，点击选项进行选择/取消）</div>';
  html += '<ul class="options-list">';
  options.forEach(function (opt) {
    var cls = 'option-item';
    if (isSubmitted) {
      var isCorrectOpt = correctLabels.indexOf(opt.label) !== -1;
      var isSelectedOpt = userLabels.indexOf(opt.label) !== -1;
      if (isCorrectOpt) cls += ' correct';
      if (isSelectedOpt && !isCorrectOpt) cls += ' wrong';
    } else {
      if (userLabels.indexOf(opt.label) !== -1) cls += ' selected';
    }
    var clickable = isSubmitted ? '' : ' onclick="App._toggleMultiple(\'' + question.id + '\',\'' + opt.label + '\')"';
    html += '<li class="' + cls + '"' + clickable + '>'
      + '  <span class="option-label">' + opt.label + '</span>'
      + '  <span class="option-text">' + App._escapeHtml(opt.text) + '</span>'
      + '</li>';
  });
  html += '</ul>';
  return html;
};

/**
 * 渲染判断题选项
 * 判断题使用"对"/"错"两个按钮，不使用选项列表
 */
App._renderJudgeOptions = function (question, isSubmitted, result) {
  var userAnswer = QuizEngine._state.answers[question.id] || '';
  var correctAnswer = question.answer;

  var html = '<div class="judge-buttons">';
  ['对', '错'].forEach(function (choice) {
    var cls = 'judge-btn';
    if (isSubmitted) {
      var normalizedCorrect = QuizEngine._normalizeJudgeAnswer(correctAnswer);
      var normalizedUser = QuizEngine._normalizeJudgeAnswer(userAnswer);
      if (choice === normalizedCorrect) cls += ' correct';
      if (choice === normalizedUser && choice !== normalizedCorrect) cls += ' wrong';
    } else {
      if (userAnswer === choice) cls += ' selected';
    }
    var clickable = isSubmitted ? '' : ' onclick="App._selectJudge(\'' + question.id + '\',\'' + choice + '\')"';
    html += '<div class="' + cls + '"' + clickable + '>' + choice + '</div>';
  });
  html += '</div>';
  return html;
};

/**
 * 渲染填空题输入框
 */
App._renderFillInput = function (question, isSubmitted, result) {
  var userAnswer = QuizEngine._state.answers[question.id] || '';
  var disabled = isSubmitted ? 'disabled' : '';
  var html = '<input type="text" class="fill-input" id="fill-answer" placeholder="请输入答案" value="' + this._escapeHtml(userAnswer) + '" ' + disabled + ' oninput="App._onFillInput(\'' + question.id + '\',this.value)">';
  return html;
};

/**
 * 渲染简答/案例题文本域
 */
App._renderTextArea = function (question, isSubmitted) {
  var userAnswer = QuizEngine._state.answers[question.id] || '';
  var disabled = isSubmitted ? 'disabled' : '';
  var html = '<textarea class="textarea-input" id="text-answer" placeholder="请输入您的答案" ' + disabled + ' oninput="App._onTextInput(\'' + question.id + '\',this.value)">' + this._escapeHtml(userAnswer) + '</textarea>';
  return html;
};

/**
 * 显示答题解析
 */
App._showAnalysis = function (question, result) {
  var card = document.querySelector('.question-card');
  if (!card) return;

  // 结果标识
  var statusHtml = '<div class="mt-4 p-3 rounded-lg '
    + (result.isCorrect ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700')
    + '" style="font-weight:bold;font-family:黑体,SimHei">'
    + (result.isCorrect ? '回答正确' : '回答错误')
    + '</div>';
  card.insertAdjacentHTML('beforeend', statusHtml);

  // 简答题/案例题显示参考答案
  if (question.type === 'short_answer' || question.type === 'case') {
    var refHtml = '<div class="reference-answer-box">'
      + '<div class="answer-title">参考答案</div>'
      + '<div class="answer-content">' + App._escapeHtml(question.answer) + '</div>'
      + '</div>';
    card.insertAdjacentHTML('beforeend', refHtml);
  }

  // 解析
  if (question.analysis) {
    var analysisHtml = '<div class="analysis-box">'
      + '<div class="analysis-title">解析</div>'
      + '<div class="analysis-content">' + App._escapeHtml(question.analysis) + '</div>'
      + '</div>';
    card.insertAdjacentHTML('beforeend', analysisHtml);
  }
}

// ===============================
// 答题交互
// ===============================

/** 选择单选选项 */
App._selectSingle = function (questionId, label) {
  QuizEngine.setAnswer(questionId, label);
  this._autoSaveProgress();
  this._renderQuiz(document.getElementById('page-content'));
};

/** 切换多选选项 */
App._toggleMultiple = function (questionId, label) {
  var current = QuizEngine._state.answers[questionId] || '';
  var labels = current.split('');
  var idx = labels.indexOf(label);
  if (idx !== -1) {
    labels.splice(idx, 1);
  } else {
    labels.push(label);
    labels.sort();
  }
  QuizEngine.setAnswer(questionId, labels.join(''));
  this._autoSaveProgress();
  this._renderQuiz(document.getElementById('page-content'));
};

/** 选择判断题选项 */
App._selectJudge = function (questionId, choice) {
  QuizEngine.setAnswer(questionId, choice);
  this._autoSaveProgress();
  this._renderQuiz(document.getElementById('page-content'));
};

/** 填空题输入 */
App._onFillInput = function (questionId, value) {
  QuizEngine.setAnswer(questionId, value);
  this._autoSaveProgress();
};

/** 简答/案例题输入 */
App._onTextInput = function (questionId, value) {
  QuizEngine.setAnswer(questionId, value);
  this._autoSaveProgress();
};

/** 提交当前题目 */
App._submitCurrent = function () {
  var question = QuizEngine.getCurrentQuestion();
  if (!question) return;

  // 检查是否作答
  var userAnswer = QuizEngine._state.answers[question.id];
  if (!userAnswer || (typeof userAnswer === 'string' && userAnswer.trim() === '')) {
    this.showToast('请先作答再提交', 'error');
    return;
  }

  var result = QuizEngine.submitCurrent();

  // 重新渲染以显示结果
  this._renderQuiz(document.getElementById('page-content'));
};

/** 下一题 */
App._nextQuestion = function () {
  if (!QuizEngine.next()) {
    this._finishQuiz();
    return;
  }
  this._renderQuiz(document.getElementById('page-content'));
};

/** 上一题 */
App._prevQuestion = function () {
  if (QuizEngine.prev()) {
    this._renderQuiz(document.getElementById('page-content'));
  }
};

/** 跳转到指定题目 */
App._goToQuestion = function (index) {
  QuizEngine.goTo(index);
  this._renderQuiz(document.getElementById('page-content'));
};

// ===============================
// 收藏功能
// ===============================

/**
 * 初始化答题页收藏按钮状态
 * 根据当前题目是否已收藏，更新按钮颜色
 * 
 * @param {Object} question - 当前题目对象
 */
App._initBookmarkState = function (question) {
  var btn = document.getElementById('bookmark-btn');
  if (!btn) return;
  QuizDB.isBookmarked(question.id).then(function (isBookmarked) {
    btn.style.color = isBookmarked ? '#f59e0b' : '#d1d5db';
    btn.title = isBookmarked ? '已收藏，点击取消' : '点击收藏';
  });
};

/**
 * 切换当前题目的收藏状态
 */
App._toggleBookmarkCurrent = function () {
  var question = QuizEngine.getCurrentQuestion();
  if (!question) return;
  var self = this;
  QuizDB.toggleBookmark(question.id).then(function (isNowBookmarked) {
    var btn = document.getElementById('bookmark-btn');
    if (btn) {
      btn.style.color = isNowBookmarked ? '#f59e0b' : '#d1d5db';
      btn.title = isNowBookmarked ? '已收藏，点击取消' : '点击收藏';
    }
    self.showToast(isNowBookmarked ? '已收藏' : '已取消收藏', 'success');
  });
};

/**
 * 渲染收藏题目页面
 */
App._renderBookmarks = function (container) {
  var self = this;
  container.innerHTML = '<h2 class="page-title">收藏题目</h2><div id="bookmarks-content" class="text-center text-gray-400">加载中...</div>';

  Promise.all([QuizDB.getAllQuestions(), QuizDB.getBookmarks()]).then(function (results) {
    var questions = results[0];
    var bookmarkIds = results[1];
    var el = document.getElementById('bookmarks-content');
    if (!el) return;

    if (bookmarkIds.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#9734;</div><div class="empty-text">暂无收藏题目</div><p class="text-gray-400 text-sm mt-2">在答题或浏览题库时，点击题目旁的星标即可收藏</p></div>';
      return;
    }

    var bookmarkedQuestions = questions.filter(function (q) {
      return bookmarkIds.indexOf(q.id) !== -1;
    });

    if (bookmarkedQuestions.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="empty-text">收藏的题目不在当前题库中，请导入或更新题库</div></div>';
      return;
    }

    // 按模块分组
    var groups = {};
    bookmarkedQuestions.forEach(function (q) {
      if (!groups[q.module]) groups[q.module] = [];
      groups[q.module].push(q);
    });

    var html = '<div class="flex flex-wrap gap-3 mb-4">'
      + '  <button class="btn-primary" onclick="App.startBookmarked()">随机练习收藏题目（' + bookmarkIds.length + '题）</button>'
      + '  <button class="btn-secondary" onclick="App.navigate(\'manage\')">去题库信息</button>'
      + '</div>';

    Object.keys(groups).forEach(function (module) {
      html += '<div class="bg-white rounded-xl p-4 shadow-md mb-3">'
        + '  <h4 class="font-bold text-base mb-2" style="color:#1e3a5f;font-family:黑体,SimHei">' + module + '（' + groups[module].length + '题）</h4>';

      groups[module].forEach(function (q) {
        html += '<div class="flex items-center justify-between py-2 border-b border-gray-200" style="gap:1rem">'
          + '  <div style="flex:1;min-width:0">'
          + '    <span class="question-type-badge badge-' + q.type + '" style="font-size:0.7rem">' + QuizEngine.getTypeName(q.type) + '</span>'
          + '    <span style="font-size:0.9rem;margin-left:0.5rem;word-break:break-all">' + self._escapeHtml(q.stem.substring(0, 60)) + (q.stem.length > 60 ? '...' : '') + '</span>'
          + '  </div>'
          + '  <button class="text-sm" style="color:#f59e0b;font-size:1.2rem;white-space:nowrap" onclick="QuizDB.toggleBookmark(\'' + q.id + '\').then(function(){App.renderPage(\'bookmarks\')})" title="取消收藏">&#9733;</button>'
          + '</div>';
      });

      html += '</div>';
    });

    el.innerHTML = html;
  });
};

/**
 * 完成答题，计算成绩
 */
App._finishQuiz = function () {
  var self = this;
  var finalResult = QuizEngine.getFinalResult();

  // 停止自动保存并清除进度（答题已完成）
  this._teardownAutoSave();
  this._clearProgress();

  // 保存记录到数据库
  QuizEngine.saveRecords(finalResult).then(function () {
    // 存储结果用于结果页展示
    self._lastResult = finalResult;
    self.navigate('result');
  });
};

// ===============================
// 计时器
// ===============================

/**
 * 启动答题计时器
 */
App._startTimer = function () {
  var self = this;
  if (this._timerInterval) clearInterval(this._timerInterval);

  this._timerInterval = setInterval(function () {
    var elapsed = Date.now() - QuizEngine._state.startTime;
    var minutes = Math.floor(elapsed / 60000);
    var seconds = Math.floor((elapsed % 60000) / 1000);
    var display = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
    var el = document.getElementById('quiz-timer');
    if (el) el.textContent = display;
  }, 1000);
};

// ===============================
// 结果页
// ===============================

/**
 * 渲染结果页
 */
App._renderResult = function (container) {
  var result = this._lastResult;
  if (!result) {
    container.innerHTML = '<div class="empty-state"><div class="empty-text">暂无答题记录</div></div>';
    return;
  }

  // 计算评级
  var grade, gradeClass;
  if (result.accuracy >= 90) { grade = '优秀'; gradeClass = 'excellent'; }
  else if (result.accuracy >= 70) { grade = '良好'; gradeClass = 'good'; }
  else if (result.accuracy >= 60) { grade = '及格'; gradeClass = 'average'; }
  else { grade = '不及格'; gradeClass = 'poor'; }

  var html = '<div class="bg-white rounded-xl p-8 shadow-md mb-6 text-center">'
    + '  <div class="result-score-ring ' + gradeClass + '">'
    + '    <div>' + result.accuracy + '%</div>'
    + '  </div>'
    + '  <div class="mt-4 text-xl font-bold" style="font-family:黑体,SimHei;color:#1e3a5f">' + grade + '</div>'
    + '</div>';

  // 成绩详情
  html += '<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">'
    + '  <div class="stat-card"><div class="stat-number">' + result.correctCount + '</div><div class="stat-label">正确题数</div></div>'
    + '  <div class="stat-card"><div class="stat-number">' + result.wrongCount + '</div><div class="stat-label">错误题数</div></div>'
    + '  <div class="stat-card"><div class="stat-number">' + result.totalCount + '</div><div class="stat-label">总题数</div></div>'
    + '  <div class="stat-card"><div class="stat-number">' + QuizEngine.formatDuration(result.duration) + '</div><div class="stat-label">答题用时</div></div>'
    + '</div>';

  // 错题列表
  if (result.wrongQuestions.length > 0) {
    html += '<div class="bg-white rounded-xl p-6 shadow-md mb-6">'
      + '  <h2 class="page-title" style="margin-top:0">错题列表（共 ' + result.wrongQuestions.length + ' 题）</h2>';

    result.wrongQuestions.forEach(function (wq) {
      html += '<div class="wrong-item">'
        + '  <div class="wrong-info">'
        + '    <span class="question-type-badge badge-' + wq.questionType + '">' + QuizEngine.getTypeName(wq.questionType) + '</span>'
        + '    <span class="difficulty-badge difficulty-' + (result.results.find(function(r){return r.questionId===wq.questionId;}) || {}).difficulty + '"></span>'
        + '  </div>'
        + '  <div class="wrong-question">' + App._escapeHtml(wq.stem) + '</div>'
        + '  <div class="wrong-meta">您的答案：' + App._escapeHtml(wq.userAnswer) + ' | 正确答案：' + App._escapeHtml(wq.correctAnswer) + '</div>';
      // 使用原始选项顺序显示（userAnswer 和 correctAnswer 均为原始标签）
      if (wq.options && wq.options.length > 0) {
        var labels = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
        html += '<div class="options-list mt-2">';
        wq.options.forEach(function (opt, i) {
          var label = labels[i] || '';
          var text = opt.replace(/^[A-H][.、．]\s*/, '');
          var isUserChoice = wq.userAnswer.indexOf(label) !== -1;
          var isCorrectChoice = wq.correctAnswer.indexOf(label) !== -1;
          var optCls = 'option-item';
          if (isUserChoice && isCorrectChoice) optCls += ' correct';
          else if (isUserChoice && !isCorrectChoice) optCls += ' wrong';
          else if (isCorrectChoice) optCls += ' correct';
          html += '<div class="' + optCls + '">' + label + '. ' + App._escapeHtml(text) + '</div>';
        });
        html += '</div>';
      }
      html += '</div>';
    });

    html += '</div>';
  }

  // 操作按钮
  html += '<div class="flex flex-wrap gap-3 justify-center">'
    + '  <button class="btn-primary" onclick="App.navigate(\'home\')">返回首页</button>'
    + '  <button class="btn-success" onclick="App.startQuiz(null,null,\'random\',null)">再来一轮</button>'
    + (result.wrongQuestions.length > 0
      ? '  <button class="btn-danger" onclick="App.startWrongBookRetry()">重做错题</button>'
      : '')
    + '  <button class="btn-secondary" onclick="App.navigate(\'stats\')">查看统计</button>'
    + '</div>';

  container.innerHTML = html;
};

/** 重做错题 */
App.startWrongBookRetry = function () {
  var self = this;
  if (!this._lastResult || !this._lastResult.wrongQuestions) return;

  var wrongIds = this._lastResult.wrongQuestions.map(function (wq) { return wq.questionId; });
  QuizEngine.init({
    questionIds: wrongIds,
    mode: 'sequential',
    shuffleOptions: true
  }).then(function (result) {
    if (result.totalCount === 0) {
      self.showToast('没有错题需要重做', 'info');
      self.navigate('home');
      return;
    }
    self._intensiveMode = false;
    // 启动自动保存机制
    self._setupAutoSave();
    self.navigate('quiz');
  });
};

/**
 * 渲染统计页面
 */
App._renderStats = function (container) {
  var self = this;
  container.innerHTML = '<h2 class="page-title">答题统计</h2><div id="stats-content" class="text-center text-gray-400">加载中...</div>';

  Promise.all([
    QuizDB.getAllQuestions(),
    QuizDB.getAllRecords()
  ]).then(function (results) {
    var questions = results[0];
    var records = results[1];
    var el = document.getElementById('stats-content');
    if (!el) return;

    // 总体统计
    var totalRecords = records.length;
    var correctRecords = records.filter(function (r) { return r.isCorrect; }).length;
    var accuracy = totalRecords > 0 ? Math.round((correctRecords / totalRecords) * 100) : 0;

    // 按题型统计
    var typeStats = {};
    var types = ['single', 'multiple', 'multi', 'judge', 'fill', 'short_answer', 'case'];
    types.forEach(function (t) {
      var typeRecords = records.filter(function (r) { return r.questionType === t; });
      var typeCorrect = typeRecords.filter(function (r) { return r.isCorrect; }).length;
      typeStats[t] = {
        total: typeRecords.length,
        correct: typeCorrect,
        accuracy: typeRecords.length > 0 ? Math.round((typeCorrect / typeRecords.length) * 100) : 0
      };
    });

    // 按模块统计
    var moduleStats = {};
    questions.forEach(function (q) {
      if (!moduleStats[q.module]) {
        moduleStats[q.module] = { total: 0, answered: 0, correct: 0 };
      }
      moduleStats[q.module].total++;
    });
    records.forEach(function (r) {
      if (moduleStats[r.module]) {
        moduleStats[r.module].answered++;
        if (r.isCorrect) moduleStats[r.module].correct++;
      }
    });

    // 渲染HTML
    var html = '';

    // 总体卡片
    html += '<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">'
      + '  <div class="stat-card"><div class="stat-number">' + questions.length + '</div><div class="stat-label">题库总量</div></div>'
      + '  <div class="stat-card"><div class="stat-number">' + totalRecords + '</div><div class="stat-label">答题次数</div></div>'
      + '  <div class="stat-card"><div class="stat-number">' + correctRecords + '</div><div class="stat-label">正确次数</div></div>'
      + '  <div class="stat-card"><div class="stat-number">' + accuracy + '%</div><div class="stat-label">总体正确率</div></div>'
      + '</div>';

    // 各题型正确率柱状图（纯CSS）
    html += '<div class="bg-white rounded-xl p-6 shadow-md mb-6">'
      + '  <h2 class="text-lg font-bold mb-4" style="font-family:黑体,SimHei;color:#1e3a5f">各题型正确率</h2>'
      + '  <div class="bar-chart">';

    var barColors = ['blue', 'purple', 'orange', 'green', 'pink', 'red'];
    var typeHasData = false;
    types.forEach(function (t, i) {
      var stat = typeStats[t];
      if (stat.total > 0) {
        typeHasData = true;
        var height = Math.max(stat.accuracy, 2);  // 最低2%高度以防看不到
        html += '<div class="bar-item">'
          + '  <div class="bar-fill ' + barColors[i] + '" style="height:' + height + '%">'
          + '    <span class="bar-value">' + stat.accuracy + '%</span>'
          + '  </div>'
          + '  <div class="bar-label">' + QUESTION_TYPE_MAP[t] + '</div>'
          + '</div>';
      }
    });

    html += '</div>';
    if (!typeHasData) {
      html += '<div class="empty-state"><div class="empty-text">暂无答题数据</div></div>';
    }
    html += '</div>';

    // 按模块统计表格
    html += '<div class="bg-white rounded-xl p-6 shadow-md mb-6">'
      + '  <h2 class="text-lg font-bold mb-4" style="font-family:黑体,SimHei;color:#1e3a5f">各模块答题情况</h2>'
      + '  <table class="data-table">'
      + '    <thead><tr>'
      + '      <th>模块</th><th>总题数</th><th>已答题数</th><th>正确数</th><th>正确率</th>'
      + '    </tr></thead><tbody>';

    Object.keys(moduleStats).forEach(function (mod) {
      var s = moduleStats[mod];
      var acc = s.answered > 0 ? Math.round((s.correct / s.answered) * 100) : '-';
      var accColor = typeof acc === 'number' ? (acc >= 80 ? 'color:#10b981' : acc >= 60 ? 'color:#f59e0b' : 'color:#ef4444') : 'color:#9ca3af';
      html += '<tr>'
        + '<td style="font-weight:bold;color:#1e3a5f">' + mod + '</td>'
        + '<td>' + s.total + '</td>'
        + '<td>' + s.answered + '</td>'
        + '<td>' + s.correct + '</td>'
        + '<td style="font-weight:bold;' + accColor + '">' + acc + (typeof acc === 'number' ? '%' : '') + '</td>'
        + '</tr>';
    });

    html += '</tbody></table></div>';

    // 答题记录（最近20条）
    if (records.length > 0) {
      html += '<div class="bg-white rounded-xl p-6 shadow-md">'
        + '  <h2 class="text-lg font-bold mb-4" style="font-family:黑体,SimHei;color:#1e3a5f">最近答题记录</h2>'
        + '  <table class="data-table">'
        + '    <thead><tr>'
        + '      <th>时间</th><th>题型</th><th>模块</th><th>结果</th>'
        + '    </tr></thead><tbody>';

      var recentRecords = records.slice(-20).reverse();
      recentRecords.forEach(function (r) {
        var time = new Date(r.timestamp).toLocaleString('zh-CN');
        html += '<tr>'
          + '<td style="font-size:0.8rem">' + time + '</td>'
          + '<td>' + QuizEngine.getTypeName(r.questionType) + '</td>'
          + '<td>' + (r.module || '-') + '</td>'
          + '<td>' + (r.isCorrect
            ? '<span style="color:#10b981;font-weight:bold">正确</span>'
            : '<span style="color:#ef4444;font-weight:bold">错误</span>') + '</td>'
          + '</tr>';
      });

      html += '</tbody></table></div>';
    }

    // 数据管理按钮
    html += '<div class="bg-white rounded-xl p-6 shadow-md mt-6">'
      + '  <h2 class="text-lg font-bold mb-4" style="font-family:黑体,SimHei;color:#1e3a5f">数据管理</h2>'
      + '  <div class="flex flex-wrap gap-3">'
      + '    <button class="btn-danger" onclick="App._confirmClearRecords()">清空答题记录</button>'
      + '    <button class="btn-danger" onclick="App._confirmResetAll()">重置所有数据</button>'
      + '  </div>'
      + '</div>';

    el.innerHTML = html;
  });
};

/** 确认清空答题记录 */
App._confirmClearRecords = function () {
  if (confirm('确定要清空所有答题记录吗？此操作不可恢复。')) {
    QuizDB.clearRecords().then(function () {
      App.showToast('答题记录已清空', 'success');
      App.renderPage('stats');

/** 确认重置所有数据 */
App._confirmResetAll = function () {
  if (confirm('确定要重置所有数据吗？这将清空题库、答题记录和设置，并重新加载默认题库。')) {
    // 清空题库、答题记录、以及初始化标记和在线更新版本信息
    QuizDB.clearQuestions()
      .then(function () { return QuizDB.clearRecords(); })
      .then(function () { return QuizDB.setSetting('questionsInitialized', false); })
      
      .then(function () { return QuizDB.init(); })
      .then(function () {
        App.showToast('数据已重置，题库已重新加载', 'success');
        App.navigate('home');
      })
      .catch(function (err) {
        App.showToast('重置失败: ' + err.message, 'error');
      });
  }
};


// ===============================
// 答题进度自动保存与恢复
// ===============================

/**
 * 自动保存当前答题进度到 localStorage
 * 在用户作答、提交答案、切换题目时调用
 * 采用防抖策略：仅在脏标记为 true 时执行实际保存
 */
App._autoSaveProgress = function () {
  this._dirtyFlag = true;
};

/**
 * 执行实际的 localStorage 写入操作
 * 由定时器周期性调用，仅在脏标记为 true 时写入
 */
App._doSaveProgress = function () {
  if (!this._dirtyFlag) return;
  if (!QuizEngine._state || !QuizEngine._state.questions || QuizEngine._state.questions.length === 0) return;

  try {
    var state = QuizEngine.exportState();
    var saveData = {
      state: state,
      intensiveMode: this._intensiveMode,
      savedAt: Date.now(),
      version: '3.1.0'
    };
    localStorage.setItem(this._AUTO_SAVE_KEY, JSON.stringify(saveData));
    this._dirtyFlag = false;
    console.log('[App] 答题进度已自动保存: 第 ' + (state.currentIndex + 1) + '/' + state.totalCount + ' 题');
  } catch (e) {
    console.warn('[App] 自动保存进度失败:', e.message);
  }

  // 同时保存到 IndexedDB（使用固定记录ID）
  this._saveAutoProgressToDB();
};

/**
 * 设置自动保存机制
 * 包括周期性定时保存和 beforeunload 事件处理
 */
App._setupAutoSave = function () {
  var self = this;
  if (this._autoSaveEnabled) return;
  this._autoSaveEnabled = true;

  // 周期性定时保存（每10秒检查一次）
  this._autoSaveTimer = setInterval(function () {
    self._doSaveProgress();
  }, this._AUTO_SAVE_INTERVAL);

  // 页面卸载前保存进度
  this._beforeUnloadHandler = function () {
    self._doSaveProgress();
  };
  window.addEventListener('beforeunload', this._beforeUnloadHandler);

  // 页面隐藏时也保存（移动端切换应用等场景）
  this._visibilityHandler = function () {
    if (document.hidden) {
      self._doSaveProgress();
    }
  };
  document.addEventListener('visibilitychange', this._visibilityHandler);

  console.log('[App] 自动保存机制已启动（间隔 ' + (self._AUTO_SAVE_INTERVAL / 1000) + ' 秒）');
};

/**
 * 移除自动保存机制
 * 在答题完成或切换页面时调用
 */
App._teardownAutoSave = function () {
  this._autoSaveEnabled = false;

  if (this._autoSaveTimer) {
    clearInterval(this._autoSaveTimer);
    this._autoSaveTimer = null;
  }

  if (this._beforeUnloadHandler) {
    window.removeEventListener('beforeunload', this._beforeUnloadHandler);
    this._beforeUnloadHandler = null;
  }

  if (this._visibilityHandler) {
    document.removeEventListener('visibilitychange', this._visibilityHandler);
    this._visibilityHandler = null;
  }

  console.log('[App] 自动保存机制已停止');
};

/**
 * 检查是否有未完成的答题进度
 * 在用户开始新答题时调用，如有进度则提示恢复
 * 
 * @returns {boolean} 是否有可恢复的进度
 */
App._hasSavedProgress = function () {
  try {
    var saved = localStorage.getItem(this._AUTO_SAVE_KEY);
    if (!saved) return false;
    var data = JSON.parse(saved);
    if (!data.state || !data.state.questions || data.state.questions.length === 0) return false;
    // 检查是否所有题目都已提交（已完成则无需恢复）
    if (data.state.isSubmitted) {
      var allSubmitted = true;
      for (var i = 0; i < data.state.questions.length; i++) {
        if (!data.state.isSubmitted[data.state.questions[i].id]) {
          allSubmitted = false;
          break;
        }
      }
      if (allSubmitted) return false;
    }
    return true;
  } catch (e) {
    return false;
  }
};

/**
 * 恢复已保存的答题进度
 * 将 localStorage 中的进度恢复到 QuizEngine 内存中
 * 
 * @returns {boolean} 恢复是否成功
 */
App._restoreProgress = function () {
  try {
    var saved = localStorage.getItem(this._AUTO_SAVE_KEY);
    if (!saved) return false;
    var data = JSON.parse(saved);
    if (!data.state || !data.state.questions || data.state.questions.length === 0) return false;

    QuizEngine.importState(data.state);
    this._intensiveMode = data.intensiveMode || false;
    this._dirtyFlag = false;

    // 恢复后立即设置自动保存
    this._setupAutoSave();

    console.log('[App] 答题进度已恢复: 第 ' + (data.state.currentIndex + 1) + '/' + data.state.totalCount + ' 题');
    return true;
  } catch (e) {
    console.warn('[App] 恢复进度失败:', e.message);
    return false;
  }
};

/**
 * 清除已保存的答题进度
 * 在答题完成或用户主动放弃时调用
 */
App._clearProgress = function () {
  try {
    localStorage.removeItem(this._AUTO_SAVE_KEY);
    this._dirtyFlag = false;
    console.log('[App] 已清除保存的答题进度');
  } catch (e) {
    console.warn('[App] 清除进度失败:', e.message);
  }
};

// ===============================
// 工具函数
// ===============================

/**
 * HTML 转义，防止 XSS
 * 
 * @param {string} str - 原始字符串
 * @returns {string} 转义后的字符串
 */

/**
 * 将当前答题进度保存到 IndexedDB（自动保存，使用固定ID）
 */
App._saveAutoProgressToDB = function () {
  var self = this;
  if (!QuizEngine._state || !QuizEngine._state.questions || QuizEngine._state.questions.length === 0) return;

  try {
    var state = QuizEngine.exportState();
    var record = {
      id: self._AUTO_SAVE_DB_ID,
      name: '自动保存',
      state: state,
      timestamp: Date.now()
    };
    QuizDB.open().then(function (db) {
      return new Promise(function (resolve, reject) {
        var transaction = db.transaction([DB_CONFIG.STORES.PROGRESS], 'readwrite');
        var store = transaction.objectStore(DB_CONFIG.STORES.PROGRESS);
        var request = store.put(record);
        request.onsuccess = function () { resolve(); };
        request.onerror = function () { reject(request.error); };
      });
    }).then(function () {
      console.log('[App] 答题进度已自动保存到 IndexedDB');
    }).catch(function (err) {
      console.warn('[App] 自动保存进度到 IndexedDB 失败:', err.message);
    });
  } catch (e) {
    console.warn('[App] 自动保存进度到 IndexedDB 失败:', e.message);
  }
};

// ===============================
// 进度管理页
// ===============================

/**
 * 渲染进度管理页面
 */
App._renderProgressPage = function (container) {
  var self = this;
  container.innerHTML = ''
    + '<h2 class="page-title">进度管理</h2>'
    + '<div class="flex flex-wrap gap-3 mb-4">'
    + '  <button class="btn-primary" onclick="App._manualSaveProgress()">手动保存当前进度</button>'
    + '  <button class="btn-danger" onclick="App._confirmClearAllProgress()">清空所有进度</button>'
    + '</div>'
    + '<div id="progress-list"></div>';

  this._loadProgressList();
};

/**
 * 加载进度列表
 */
App._loadProgressList = function () {
  var listEl = document.getElementById('progress-list');
  if (!listEl) return;

  QuizDB.getAllProgress().then(function (records) {
    if (records.length === 0) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x23F3;</div><div class="empty-text">暂无保存的进度</div></div>';
      return;
    }

    var html = '';
    records.forEach(function (record) {
      var time = new Date(record.timestamp).toLocaleString('zh-CN');
      var state = record.state || {};
      var totalCount = state.totalCount || 0;
      var currentIndex = (state.currentIndex || 0) + 1;
      html += '<div class="bg-white rounded-xl p-4 shadow-md mb-3">'
        + '  <div class="flex justify-between items-center mb-2">'
        + '    <div style="font-weight:bold;color:#1e3a5f;font-family:黑体,SimHei">' + App._escapeHtml(record.name) + '</div>'
        + '    <span style="color:#9ca3af;font-size:0.8rem">' + time + '</span>'
        + '  </div>'
        + '  <div class="text-sm text-gray-600 mb-3">第 ' + currentIndex + ' / ' + totalCount + ' 题</div>'
        + '  <div class="flex flex-wrap gap-2">'
        + '    <button class="btn-primary btn-sm" onclick="App._restoreProgressFromDB(' + record.id + ')">恢复</button>'
        + '    <button class="btn-secondary btn-sm" onclick="App._deleteProgressFromDB(' + record.id + ')">删除</button>'
        + '  </div>'
        + '</div>';
    });

    listEl.innerHTML = html;
  }).catch(function (err) {
    console.error('[App] 加载进度列表失败:', err);
    listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x26A0;</div><div class="empty-text">加载进度数据失败</div></div>';
  });
};

/**
 * 从 IndexedDB 恢复指定进度
 *
 * @param {number} id - 进度记录ID
 */
App._restoreProgressFromDB = function (id) {
  var self = this;
  QuizDB.getProgress(id).then(function (record) {
    if (!record || !record.state) {
      self.showToast('进度记录不存在或已损坏', 'error');
      return;
    }
    QuizEngine.importState(record.state);
    self._intensiveMode = false;
    self._dirtyFlag = false;
    self._setupAutoSave();
    self.navigate('quiz');
    self.showToast('进度已恢复', 'success');
  }).catch(function (err) {
    self.showToast('恢复进度失败: ' + err.message, 'error');
  });
};

/**
 * 从 IndexedDB 删除指定进度
 *
 * @param {number} id - 进度记录ID
 */
App._deleteProgressFromDB = function (id) {
  var self = this;
  QuizDB.deleteProgress(id).then(function () {
    self.showToast('进度已删除', 'success');
    self._loadProgressList();
  }).catch(function (err) {
    self.showToast('删除进度失败: ' + err.message, 'error');
  });
};

/**
 * 确认清空所有进度
 */
App._confirmClearAllProgress = function () {
  var self = this;
  if (confirm('确定要清空所有保存的进度吗？此操作不可恢复。')) {
    QuizDB.clearProgress().then(function () {
      self.showToast('所有进度已清空', 'success');
      self._loadProgressList();
    }).catch(function (err) {
      self.showToast('清空进度失败: ' + err.message, 'error');
    });
  }
};

/**
 * 手动保存当前进度到 IndexedDB
 */
App._manualSaveProgress = function () {
  var self = this;
  if (!QuizEngine._state || !QuizEngine._state.questions || QuizEngine._state.questions.length === 0) {
    this.showToast('当前没有正在进行的答题进度', 'error');
    return;
  }

  var name = prompt('请输入进度名称（留空使用默认名称）：');
  if (name === null) return; // 用户点击取消

  var state = QuizEngine.exportState();
  var record = {
    name: name || ('手动保存_' + new Date().toLocaleString('zh-CN')),
    state: state,
    timestamp: Date.now()
  };

  QuizDB.saveProgress(record).then(function () {
    self.showToast('进度已保存', 'success');
    self._loadProgressList();
  }).catch(function (err) {
    self.showToast('保存进度失败: ' + err.message, 'error');
  });
};

App._escapeHtml = function (str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
};

/**
 * 显示 Toast 提示
 * 
 * @param {string} message - 提示消息
 * @param {string} type - 类型（success/error/info）
 * @param {number} duration - 显示时长（毫秒）
 */
App.showToast = function (message, type, duration) {
  type = type || 'info';
  duration = duration || 3000;

  // 移除现有 toast
  var existing = document.querySelectorAll('.toast');
  existing.forEach(function (el) { el.remove(); });

  var toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  document.body.appendChild(toast);

  setTimeout(function () {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s ease';
    setTimeout(function () { toast.remove(); }, 300);
  }, duration);
};

// ===============================
// DOM Ready
// ===============================

document.addEventListener('DOMContentLoaded', function () {
  App.init();
});
  </script>
